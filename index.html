function save(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }

let budgets = load('budgets', {});
let budgetMonth = new Date().getMonth();
let budgetYear = new Date().getFullYear();

function getBudgetKey(m, y) { return y+'-'+m; }
function getCurrentBudget() {
  const key = getBudgetKey(budgetMonth, budgetYear);
  return budgets[key] || {スーパー:0,外食:0,カフェ:0,その他:0};
}
// legacy support
let budget = load('budget', {スーパー:15000,外食:8000,カフェ:4000,その他:3000});
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();
let viewYear = new Date().getFullYear();
let viewMonth = new Date().getMonth();
let selectedDay = null;
let oldVisible = false;

function getMonthEntries(m, y) {
  if (m === undefined) { m = viewMonth; y = viewYear; }
  return entries.filter(e => e.month === m && e.year === y);
}

function isViewingCurrentMonth() {
  const now = new Date();
  return viewMonth === now.getMonth() && viewYear === now.getFullYear();
}

function changeViewMonth(dir) {
  viewMonth += dir;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  oldVisible = false;
  initHome();
}

function goToday() {
  const now = new Date();
  viewMonth = now.getMonth();
  viewYear = now.getFullYear();
  oldVisible = false;
  initHome();
}

function getTotalSpent() {
  return getMonthEntries(viewMonth, viewYear).reduce((s,e) => s+e.amount, 0);
}

function getTotalBudget() {
  const key = getBudgetKey(viewMonth, viewYear);
  const b = budgets[key];
  if (b && b._total !== undefined) return b._total;
  return budget._total || CATS.reduce((s,c) => s+(budget[c]||0), 0);
}
function getActiveBudget() {
  const key = getBudgetKey(budgetMonth, budgetYear);
  return budgets[key] || {スーパー:0,外食:0,カフェ:0,その他:0};
}

function initHome() {
  const now = new Date();
  const isCurrent = isViewingCurrentMonth();
  const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('home-title').textContent = monthNames[viewMonth] + 'の食費';
  document.getElementById('home-sub').textContent = viewYear + '年' + monthNames[viewMonth];

  const spent = getTotalSpent();
  const total = getTotalBudget();
  const remain = total - spent;
  const pct = Math.min(100, Math.round(spent / total * 100));

  document.getElementById('h-spent').textContent = '¥' + spent.toLocaleString();
  document.getElementById('h-budget-sub').textContent = '予算 ¥' + total.toLocaleString() + ' まで残り ¥' + remain.toLocaleString();
  document.getElementById('h-prog').style.width = pct + '%';

  // 1日あたり：今月のみ表示、過去月は合計のみ
  const dailyCard = document.querySelector('.daily-card');
  if (isCurrent) {
    dailyCard.style.display = 'flex';
    const lastDay = new Date(viewYear, viewMonth+1, 0).getDate();
    const daysLeft = lastDay - now.getDate() + 1;
    const perDay = remain > 0 ? Math.round(remain / daysLeft) : 0;
    document.getElementById('h-daily').textContent = remain > 0 ? '¥' + perDay.toLocaleString() + ' / 日' : '予算オーバー';
    document.getElementById('h-daily-sub').textContent = '残り' + daysLeft + '日 · 残り予算 ¥' + remain.toLocaleString();
  } else {
    dailyCard.style.display = 'none';
  }

  // Cat grid
  const catSpent = {};
  CATS.forEach(c => catSpent[c] = 0);
  getMonthEntries(viewMonth, viewYear).forEach(e => { if (catSpent[e.cat] !== undefined) catSpent[e.cat] += e.amount; });
  document.getElementById('cat-grid').innerHTML = CATS.map(c => {
    const pct = Math.min(100, Math.round(catSpent[c] / budget[c] * 100)) || 0;
    return `<div class="cat-card">
      <div class="ci">${CAT_ICONS[c]}</div>
      <div class="cn">${c}</div>
      <div class="ca">¥${catSpent[c].toLocaleString()}</div>
      <div class="mini-bg"><div class="mini-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');

  // Recent：表示中の月のデータ
  const monthEntries = getMonthEntries(viewMonth, viewYear);
  document.getElementById('recent-top').innerHTML = monthEntries.slice(0,3).map(e => `
    <div class="recent-card">
      <div class="r-left"><div class="r-dot" style="background:${CAT_COLORS[e.cat]||'#888'}"></div>
        <div><div class="r-name">${e.memo}</div><div class="r-meta">${e.date} · ${e.cat}</div></div>
      </div>
      <div class="r-amt">¥${e.amount.toLocaleString()}</div>
    </div>`).join('');

  if (oldVisible) renderOldList();
  calMonth = viewMonth; calYear = viewYear; selectedDay = null;
  renderCalendar();
}

function renderOldList() {
  const monthEntries = getMonthEntries(viewMonth, viewYear);
  document.getElementById('old-list').innerHTML = monthEntries.slice(3).map(e => `
    <div class="item-row">
      <div style="display:flex;align-items:center">
        <div class="i-dot" style="background:${CAT_COLORS[e.cat]||'#888'}"></div>
        <div><div class="i-name">${e.memo}</div><div class="i-date">${e.date} · ${e.cat}</div></div>
      </div>
      <div class="i-amt">¥${e.amount.toLocaleString()}</div>
    </div>`).join('');
}

function toggleOld() {
  oldVisible = !oldVisible;
  document.getElementById('old-entries').style.display = oldVisible ? 'block' : 'none';
  document.getElementById('toggle-btn').textContent = oldVisible ? '閉じる' : 'もっと見る';
  if (oldVisible) renderOldList();
}

function getDayTotal(d, m, y) {
  return entries.filter(e => e.day===d && e.month===m && e.year===y).reduce((s,e) => s+e.amount, 0);
}

function renderCalendar() {
  const mn = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('cal-month-title').textContent = calYear + '年 ' + mn[calMonth];
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const today = new Date();
  const isCur = today.getFullYear()===calYear && today.getMonth()===calMonth;
  let html = '';
  for (let i=0; i<firstDay; i++) html += '<div class="cal-day" style="cursor:default"></div>';
  for (let d=1; d<=daysInMonth; d++) {
    const tot = getDayTotal(d, calMonth, calYear);
    const isToday = isCur && today.getDate()===d;
    const isSel = selectedDay===d;
    html += `<div class="cal-day${isToday?' today':''}${isSel?' selected':''}" onclick="selDay(${d})">
      <div class="dn">${d}</div>
      ${tot>0?`<div class="da">¥${tot.toLocaleString()}</div>`:''}
    </div>`;
  }
  document.getElementById('cal-days').innerHTML = html;
  renderDayDetail();
}

function selDay(d) { selectedDay=d; renderCalendar(); }

function renderDayDetail() {
  const mn=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const det = document.getElementById('cal-detail');
  if (!selectedDay) { det.innerHTML='<div style="font-size:13px;color:var(--text2)">日付をタップして確認</div>'; return; }
  const dayEntries = entries.filter(e => e.day===selectedDay && e.month===calMonth && e.year===calYear);
  const title = `<div style="font-size:12px;color:var(--text2);margin-bottom:8px">${mn[calMonth]}${selectedDay}日の支出</div>`;
  if (!dayEntries.length) { det.innerHTML=title+'<div style="font-size:13px;color:var(--text2)">支出なし</div>'; return; }
  const tot = dayEntries.reduce((s,e) => s+e.amount, 0);
  det.innerHTML = title + dayEntries.map(e => `
    <div class="cal-sum">
      <div style="display:flex;align-items:center;gap:8px">
        <div style="width:6px;height:6px;border-radius:50%;background:${CAT_COLORS[e.cat]||'#888'};flex-shrink:0"></div>
        <div><div style="font-size:13px;color:var(--text)">${e.memo}</div><div style="font-size:11px;color:var(--text2)">${e.cat}</div></div>
      </div>
      <div style="font-size:13px;font-weight:500;color:var(--text)">¥${e.amount.toLocaleString()}</div>
    </div>`).join('') +
    `<div style="display:flex;justify-content:space-between;padding-top:8px;margin-top:4px;border-top:0.5px solid var(--border)">
      <div style="font-size:12px;font-weight:600;color:var(--green-dark)">合計</div>
      <div style="font-size:13px;font-weight:600;color:var(--green-darker)">¥${tot.toLocaleString()}</div>
    </div>`;
}

function changeMonth(dir) {
  calMonth += dir;
  if (calMonth>11) { calMonth=0; calYear++; }
  if (calMonth<0) { calMonth=11; calYear--; }
  selectedDay=null;
  renderCalendar();
}

function initAdd() {
  const today = new Date();
  initPicker(today.getFullYear(), today.getMonth()+1, today.getDate());
}

function openPicker() {
  document.getElementById('picker-backdrop').classList.add('open');
  document.getElementById('picker-sheet').classList.add('open');
}

function closePicker() {
  document.getElementById('picker-backdrop').classList.remove('open');
  document.getElementById('picker-sheet').classList.remove('open');
  updatePickerLabel();
}

function updatePickerLabel() {
  const y = getPickerValue('pick-year') || new Date().getFullYear();
  const m = getPickerValue('pick-month') || new Date().getMonth()+1;
  const d = getPickerValue('pick-day') || new Date().getDate();
  const mn = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('picker-trigger-label').textContent = y + '年 ' + mn[m-1] + d + '日';
}

function initPicker(selYear, selMonth, selDay) {
  const now = new Date();
  const curYear = now.getFullYear();

  // Year
  const years = [curYear-1, curYear, curYear+1];
  const yearEl = document.getElementById('pick-year');
  yearEl.innerHTML = '<div class="picker-item" style="height:68px"></div>' +
    years.map(y => `<div class="picker-item" data-val="${y}">${y}</div>`).join('') +
    '<div class="picker-item" style="height:68px"></div>';

  // Month
  const monthEl = document.getElementById('pick-month');
  monthEl.innerHTML = '<div class="picker-item" style="height:68px"></div>' +
    Array.from({length:12},(_,i)=>i+1).map(m => `<div class="picker-item" data-val="${m}">${m}月</div>`).join('') +
    '<div class="picker-item" style="height:68px"></div>';

  // Day
  const daysInMonth = new Date(selYear, selMonth, 0).getDate();
  const dayEl = document.getElementById('pick-day');
  dayEl.innerHTML = '<div class="picker-item" style="height:68px"></div>' +
    Array.from({length:daysInMonth},(_,i)=>i+1).map(d => `<div class="picker-item" data-val="${d}">${d}日</div>`).join('') +
    '<div class="picker-item" style="height:68px"></div>';

  // Scroll to selected
  scrollPickerTo('pick-year', years.indexOf(selYear));
  scrollPickerTo('pick-month', selMonth-1);
  scrollPickerTo('pick-day', selDay-1);
  updatePickerLabel();

  // Listen for scroll
  ['pick-year','pick-month','pick-day'].forEach(id => {
    const el = document.getElementById(id);
    el.onscroll = () => { onPickerScroll(id); setTimeout(updatePickerLabel, 150); };
  });
}

function scrollPickerTo(id, index) {
  const el = document.getElementById(id);
  el.scrollTop = index * 44;
}

function getPickerValue(id) {
  const el = document.getElementById(id);
  const index = Math.round(el.scrollTop / 44);
  const items = el.querySelectorAll('[data-val]');
  return items[index] ? parseInt(items[index].dataset.val) : null;
}

function onPickerScroll(id) {
  if (id === 'pick-year' || id === 'pick-month') {
    setTimeout(() => {
      const y = getPickerValue('pick-year') || new Date().getFullYear();
      const m = getPickerValue('pick-month') || new Date().getMonth()+1;
      const d = getPickerValue('pick-day') || new Date().getDate();
      const maxDay = new Date(y, m, 0).getDate();
      if (id === 'pick-month' || id === 'pick-year') {
        const dayEl = document.getElementById('pick-day');
        const curDay = Math.min(d, maxDay);
        dayEl.innerHTML = '<div class="picker-item" style="height:68px"></div>' +
          Array.from({length:maxDay},(_,i)=>i+1).map(day => `<div class="picker-item" data-val="${day}">${day}日</div>`).join('') +
          '<div class="picker-item" style="height:68px"></div>';
        scrollPickerTo('pick-day', curDay-1);
      }
    }, 100);
  }
}

function addEntry() {
  const amount = parseInt(document.getElementById('inp-amount').value);
  const cat = document.getElementById('inp-cat').value;
  const memoInput = document.getElementById('inp-memo').value.trim();
  const memo = memoInput || cat;
  if (!amount) { showToast('金額を入力してください'); return; }
  const year = getPickerValue('pick-year') || new Date().getFullYear();
  const month = (getPickerValue('pick-month') || new Date().getMonth()+1) - 1;
  const day = getPickerValue('pick-day') || new Date().getDate();
  const mn = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const dateStr = mn[month] + day + '日';
  entries.unshift({amount,memo,cat,date:dateStr,day,month,year});
  save('entries', entries);
  document.getElementById('inp-amount').value='';
  document.getElementById('inp-memo').value='';
  showToast('追加しました！');
  show('home');
}

function initBudget() {
  const mn = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('b-month-sub').textContent = budgetYear + '年' + mn[budgetMonth];
  const b = getActiveBudget();
  const total = (b._total !== undefined && b._total !== null) ? b._total : CATS.reduce((s,c) => s+(b[c]||0), 0);
  document.getElementById('b-合計').value = total > 0 ? total : '';
  CATS.forEach(c => {
    const el = document.getElementById('b-' + c);
    if (el) el.value = b[c] > 0 ? b[c] : '';
  });
  updateBudgetTotal();
}

function changeBudgetMonth(dir) {
  budgetMonth += dir;
  if (budgetMonth > 11) { budgetMonth = 0; budgetYear++; }
  if (budgetMonth < 0) { budgetMonth = 11; budgetYear--; }
  initBudget();
}

function goBudgetToday() {
  const now = new Date();
  budgetMonth = now.getMonth();
  budgetYear = now.getFullYear();
  initBudget();
}




function updateBudgetTotal() {
  const el = document.getElementById('b-total');
  if (el) {
    let total = 0;
    CATS.forEach(c => { total += parseInt(document.getElementById('b-'+c)?.value) || 0; });
    el.textContent = '¥' + total.toLocaleString();
  }
}

function saveBudget() {
  const key = getBudgetKey(budgetMonth, budgetYear);
  const b = {};
  b._total = parseInt(document.getElementById('b-合計')?.value) || 0;
  b['スーパー'] = parseInt(document.getElementById('b-スーパー')?.value) || 0;
  b['外食'] = parseInt(document.getElementById('b-外食')?.value) || 0;
  b['カフェ'] = parseInt(document.getElementById('b-カフェ')?.value) || 0;
  b['その他'] = parseInt(document.getElementById('b-その他')?.value) || 0;
  budgets[key] = b;
  budget = b;
  save('budgets', budgets);
  save('budget', b);
  // viewMonthも合わせてhomeに反映
  viewMonth = budgetMonth;
  viewYear = budgetYear;
  showToast('予算を保存しました！');
  setTimeout(() => show('home'), 600);
}

function show(tab) {
  ['home','add','budget'].forEach(t => {
    document.getElementById('s-'+t).classList.remove('active');
    document.querySelectorAll('.nav-btn').forEach((b,i) => {
      const tabs = ['home','add','budget'];
      b.classList.toggle('active', tabs[i]===tab);
    });
  });
  document.getElementById('s-'+tab).classList.add('active');
  if (tab==='home') initHome();
  if (tab==='add') initAdd();
  if (tab==='budget') { budgetMonth=viewMonth; budgetYear=viewYear; initBudget(); }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js');
  });
}

initHome();
</script>
